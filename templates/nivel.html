{% extends 'base.html' %}

{% block content %}
    <h2>{{ nivel.titulo }}</h2>
    
    <div class="lore-text">
        <p>{{ nivel.lore }}</p>
    </div>

    <div class="content-box">
        {% for item in nivel.contenido %}
            <p>{{ item }}</p>
        {% endfor %}
    </div>
    
    <div class="quiz-section">
        <h3>Prueba de Conocimiento</h3>
        
        <div class="question">
            <label><strong>1. {{ nivel.q1.pregunta }}</strong></label>
            <select id="q1" onchange="verificarRespuestas()">
                <option value="">-- Selecciona una respuesta --</option>
                {% for opcion in nivel.q1.opciones %}
                    <option value="{{ opcion }}">{{ opcion }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="question">
            <label><strong>2. {{ nivel.q2.pregunta }}</strong></label>
            <select id="q2" onchange="verificarRespuestas()">
                <option value="">-- Selecciona una respuesta --</option>
                {% for opcion in nivel.q2.opciones %}
                    <option value="{{ opcion }}">{{ opcion }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="compromiso-box" id="cajaCompromiso">
        <label>
            <input type="checkbox" id="checkCompromiso" onchange="verificarCompromiso()">
            Juro por mi honor de desarrollador que he comprendido esta información.
        </label>
    </div>

    <a href="{{ nivel.siguiente_url }}" class="btn" id="nav-siguiente">{{ nivel.nombre_siguiente }}</a>

    <script>
        const resp1Correcta = "{{ nivel.q1.respuesta }}";
        const resp2Correcta = "{{ nivel.q2.respuesta }}";

        function verificarRespuestas() {
            const val1 = document.getElementById('q1').value;
            const val2 = document.getElementById('q2').value;
            const cajaCompromiso = document.getElementById('cajaCompromiso');

            if (val1 === resp1Correcta && val2 === resp2Correcta) {
                cajaCompromiso.style.display = 'block';
            } else {
                cajaCompromiso.style.display = 'none';
                document.getElementById('checkCompromiso').checked = false;
                verificarCompromiso();
            }
        }

        function verificarCompromiso() {
            const isChecked = document.getElementById('checkCompromiso').checked;
            const btnSiguiente = document.getElementById('nav-siguiente');

            if (isChecked) {
                btnSiguiente.style.display = 'block';
            } else {
                btnSiguiente.style.display = 'none';
            }
        }
    </script>
{% endblock %}
